spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      mvc:
      routes:
          - id: HOTEL-SERVICE
            uri: lb://HOTEL-SERVICE
            predicates:
              - Path=/api/hotels/**
          - id: RATING-SERVICE
            uri: lb://RATING-SERVICE
            predicates:
              - Path=/api/ratings/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8888


